name: Publish json-contracts-studio

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag and package.json versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$TAG_VERSION" = "$PACKAGE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Test package
        run: npm test

      - name: Pack check
        run: npm run pack:dry-run

      - name: Verify npm auth
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error title=Missing NPM_TOKEN::Add an npm publish token as the repository secret named NPM_TOKEN."
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package to npm
        run: |
          npm publish --provenance || {
            status=$?
            echo "::error title=npm publish failed::If this failed with EOTP, replace repository secret NPM_TOKEN with an npm Automation/granular publish token or configure npm Trusted Publishing for this GitHub workflow. Normal 2FA login tokens cannot publish from Actions."
            exit "$status"
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
